name: Nightly Database Backup

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  trigger-backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger backup endpoint
        env:
          BACKUP_JOB_URL: ${{ secrets.BACKUP_JOB_URL }}
          BACKUP_JOB_SECRET: ${{ secrets.BACKUP_JOB_SECRET }}
        run: |
          if [ -z "$BACKUP_JOB_URL" ]; then
            echo "BACKUP_JOB_URL secret is not configured"
            exit 1
          fi

          if [ -z "$BACKUP_JOB_SECRET" ]; then
            echo "BACKUP_JOB_SECRET secret is not configured"
            exit 1
          fi

          response_file=$(mktemp)
          http_code=$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST "$BACKUP_JOB_URL" \
            -H "x-backup-job-secret: $BACKUP_JOB_SECRET" \
            -H "Content-Type: application/json")

          echo "HTTP status: $http_code"
          cat "$response_file"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Backup trigger failed"
            exit 1
          fi
